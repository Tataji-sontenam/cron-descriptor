ame: Cron Description Generator

on:
  workflow_dispatch:
    inputs:
      cron_list:
        description: "Enter cron expressions separated by ;"
        required: true

jobs:
  generate-description:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependency
        run: pip install cron-descriptor

      - name: Run Python script
        run: python cron_description.py "${{ github.event.inputs.cron_list }}"
